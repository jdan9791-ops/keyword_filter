<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, "Malgun Gothic", sans-serif;
      color: #cdd6f4;
      user-select: none;
      -webkit-app-region: drag;
    }
    .icon { font-size: 36px; margin-bottom: 14px; }
    .title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .msg { font-size: 12px; color: #a6adc8; }
  </style>
</head>
<body>
  <div class="icon">🔍</div>
  <div class="title">키워드 필터 검색기</div>
  <div class="msg">시작 준비 중입니다...</div>
</body>
</html>
